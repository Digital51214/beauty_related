name: beauty_related
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  get: ^4.6.6
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9


flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"


flutter_native_splash:
  color: "#46151A"
  image: assets/images/MainLogo1.png
  android: true
  ios: true
  android_12:
    color: "#46151A"
    image: assets/images/mainlogo3.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/vedio.mp4

  fonts:
    - family: A
      fonts:
        - asset: assets/fonts/PlayfairDisplay-VariableFont_wght.ttf